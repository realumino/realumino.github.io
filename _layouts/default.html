<!DOCTYPE html>
<html lang="{{ page.lang | default: 'zh' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS" href="{{ site.url }}/feed.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* =========================================================
       Apple-Inspired Design System for Lumino Blog
       Design Library: 苹果 (Pinguo Apple Design)
       ========================================================= */

    /* ── Design Tokens ── */
    :root {
      /* Colors - Apple HIG inspired */
      --apple-bg: #f5f5f7;
      --apple-surface: #ffffff;
      --apple-text-primary: #1d1d1f;
      --apple-text-secondary: #6e6e73;
      --apple-text-tertiary: #aeaeb2;
      --apple-border: #d2d2d7;
      --apple-border-light: #e5e5ea;
      --apple-accent: #0066cc;
      --apple-accent-hover: #004499;
      --apple-tag-bg: #e8e8ed;
      --apple-tag-text: #48484a;
      --apple-tag-hover: #0066cc;
      --apple-code-bg: #f5f5f7;
      --apple-code-border: #e5e5ea;
      --apple-blockquote-border: #0066cc;
      --apple-blockquote-bg: #f2f2f7;
      --apple-link: #0066cc;
      --apple-link-hover: #004499;
      --apple-header-bg: rgba(245, 245, 247, 0.85);
      --apple-shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
      --apple-shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --apple-shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.08);

      /* Spacing */
      --space-2xs: 0.25rem;
      --space-xs: 0.5rem;
      --space-sm: 0.75rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --space-3xl: 4rem;

      /* Typography */
      --font-sans: "PingFang SC", "SF Pro SC", "SF Pro Text", "Helvetica Neue", system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;

      /* Radius */
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;

      /* Content */
      --max-width: 680px;
      --content-padding: 1.25rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: var(--font-sans);
      background: var(--apple-bg);
      color: var(--apple-text-primary);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Sticky Header with Blur ── */
    header.site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--apple-header-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--apple-border-light);
      width: 100%;
    }

    .header-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 0.75rem var(--content-padding);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-brand {
      display: flex;
      flex-direction: column;
    }

    .site-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--apple-text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
      transition: color 0.2s;
    }

    .site-title:hover { color: var(--apple-accent); }

    .site-subtitle {
      font-size: 0.75rem;
      color: var(--apple-text-tertiary);
      font-weight: 400;
      margin-top: -0.05rem;
    }

    .nav-links {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }

    .nav-links a {
      font-size: 0.85rem;
      color: var(--apple-text-secondary);
      text-decoration: none;
      font-weight: 400;
      padding: 0.25rem 0;
      position: relative;
      transition: color 0.2s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--apple-accent);
      border-radius: 1px;
      transition: width 0.25s ease;
    }

    .nav-links a:hover { color: var(--apple-text-primary); }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: var(--apple-text-primary); }
    .nav-links a.active::after { width: 100%; }

    /* ── Main Content ── */
    main {
      flex: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: var(--space-2xl) var(--content-padding);
      width: 100%;
    }

    /* ── Footer ── */
    footer.site-footer {
      text-align: center;
      padding: var(--space-2xl) var(--content-padding);
      border-top: 1px solid var(--apple-border-light);
      margin-top: auto;
    }

    footer.site-footer p {
      font-size: 0.75rem;
      color: var(--apple-text-tertiary);
      line-height: 1.5;
    }

    /* ── Post List (Index) ── */
    .post-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .post-item {
      background: var(--apple-surface);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      border: 1px solid var(--apple-border-light);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .post-item:hover {
      border-color: var(--apple-border);
      box-shadow: var(--apple-shadow-sm);
    }

    .post-item .post-date {
      font-size: 0.75rem;
      color: var(--apple-text-tertiary);
      margin-bottom: var(--space-2xs);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .post-item .post-title {
      display: block;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--apple-text-primary);
      text-decoration: none;
      line-height: 1.4;
      transition: color 0.2s;
    }

    .post-item .post-title:hover { color: var(--apple-accent); }

    .post-item .post-excerpt {
      font-size: 0.875rem;
      color: var(--apple-text-secondary);
      margin-top: var(--space-xs);
      line-height: 1.6;
    }

    .post-item .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: var(--space-sm);
    }

    /* ── Tag Pills ── */
    .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 500;
      background: var(--apple-tag-bg);
      color: var(--apple-tag-text);
      padding: 0.15rem 0.6rem;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.01em;
    }

    .tag:hover {
      background: var(--apple-tag-hover);
      color: #fff;
    }

    /* ── Single Post ── */
    .post-header {
      margin-bottom: var(--space-2xl);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.85rem;
      color: var(--apple-text-secondary);
      text-decoration: none;
      margin-bottom: var(--space-lg);
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--apple-accent); }

    .post-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: var(--space-sm);
      letter-spacing: -0.02em;
      color: var(--apple-text-primary);
    }

    .post-meta {
      font-size: 0.8rem;
      color: var(--apple-text-tertiary);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .post-meta .tags {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .post-lang-badge {
      font-size: 0.7rem;
      color: var(--apple-accent);
      font-weight: 500;
    }

    /* ── Post Content Typography ── */
    .post-content {
      padding-bottom: var(--space-2xl);
    }

    .post-content p {
      margin: var(--space-md) 0;
      font-size: 1rem;
      line-height: 1.75;
      color: var(--apple-text-primary);
    }

    .post-content h2 {
      font-size: 1.4rem;
      margin: var(--space-2xl) 0 var(--space-sm);
      font-weight: 650;
      letter-spacing: -0.01em;
      color: var(--apple-text-primary);
      padding-top: var(--space-sm);
    }

    .post-content h3 {
      font-size: 1.15rem;
      margin: var(--space-xl) 0 var(--space-xs);
      font-weight: 600;
      color: var(--apple-text-primary);
    }

    .post-content h4 {
      font-size: 1rem;
      margin: var(--space-lg) 0 var(--space-xs);
      font-weight: 600;
      color: var(--apple-text-primary);
    }

    .post-content a {
      color: var(--apple-link);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, color 0.2s;
    }

    .post-content a:hover {
      color: var(--apple-link-hover);
      border-bottom-color: var(--apple-link-hover);
    }

    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius-md);
      margin: var(--space-lg) 0;
      box-shadow: var(--apple-shadow-sm);
    }

    .post-content blockquote {
      border-left: 3px solid var(--apple-blockquote-border);
      margin: var(--space-lg) 0;
      padding: var(--space-sm) var(--space-lg);
      background: var(--apple-blockquote-bg);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--apple-text-secondary);
      font-style: normal;
    }

    .post-content blockquote p {
      margin: var(--space-xs) 0;
      color: var(--apple-text-secondary);
    }

    .post-content ul,
    .post-content ol {
      margin: var(--space-sm) 0;
      padding-left: 1.5rem;
    }

    .post-content li {
      margin: 0.3rem 0;
      line-height: 1.7;
    }

    .post-content code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--apple-code-bg);
      padding: 0.15em 0.4em;
      border-radius: var(--radius-sm);
      border: 1px solid var(--apple-code-border);
      color: var(--apple-text-primary);
    }

    .post-content pre {
      background: var(--apple-code-bg);
      border: 1px solid var(--apple-code-border);
      border-radius: var(--radius-md);
      padding: var(--space-lg);
      overflow-x: auto;
      margin: var(--space-lg) 0;
      font-size: 0.85rem;
      line-height: 1.65;
    }

    .post-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
    }

    .post-content hr {
      border: none;
      border-top: 1px solid var(--apple-border-light);
      margin: var(--space-2xl) 0;
    }

    .post-content table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: var(--space-lg) 0;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--apple-border-light);
    }

    .post-content th,
    .post-content td {
      padding: 0.6rem 0.9rem;
      text-align: left;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--apple-border-light);
    }

    .post-content th {
      background: var(--apple-code-bg);
      font-weight: 600;
      color: var(--apple-text-primary);
    }

    .post-content tr:last-child td {
      border-bottom: none;
    }

    .post-content strong {
      font-weight: 650;
    }

    /* ── Post Navigation ── */
    .post-nav {
      display: flex;
      justify-content: space-between;
      gap: var(--space-lg);
      padding: var(--space-xl) 0;
      border-top: 1px solid var(--apple-border-light);
      margin-top: var(--space-md);
    }

    .post-nav span {
      flex: 1;
      max-width: 50%;
    }

    .post-nav span:last-child {
      text-align: right;
    }

    .post-nav a {
      color: var(--apple-accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .post-nav a:hover { color: var(--apple-accent-hover); }

    /* ── Tags Page ── */
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: var(--space-2xl);
      padding-bottom: var(--space-xl);
      border-bottom: 1px solid var(--apple-border-light);
    }

    .tag-cloud .tag {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
    }

    .tag-group {
      margin-bottom: var(--space-xl);
    }

    .tag-group h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: var(--space-sm);
      color: var(--apple-text-primary);
      letter-spacing: -0.01em;
    }

    .tag-group ul {
      list-style: none;
      padding: 0;
    }

    .tag-group li {
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--apple-border-light);
      font-size: 0.9rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .tag-group li:last-child {
      border-bottom: none;
    }

    .tag-group li .date {
      color: var(--apple-text-tertiary);
      font-size: 0.8rem;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .tag-group a {
      color: var(--apple-text-primary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .tag-group a:hover { color: var(--apple-accent); }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: var(--space-3xl) 0;
      color: var(--apple-text-tertiary);
    }

    .empty-state p {
      font-size: 1rem;
    }

    /* ── Page Title ── */
    .page-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-xl);
      color: var(--apple-text-primary);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      html { font-size: 15px; }

      .header-inner {
        padding: 0.6rem var(--content-padding);
        flex-direction: column;
        gap: 0.3rem;
      }

      .site-title {
        font-size: 1.05rem;
        text-align: center;
      }

      .site-subtitle {
        text-align: center;
      }

      .nav-links {
        gap: 1rem;
      }

      main {
        padding: var(--space-lg) var(--content-padding);
      }

      .post-header h1 {
        font-size: 1.5rem;
      }

      .post-item {
        padding: var(--space-md);
      }

      .post-nav {
        flex-direction: column;
        gap: var(--space-sm);
      }

      .post-nav span {
        max-width: 100%;
      }

      .post-nav span:last-child {
        text-align: left;
      }

      .tag-group li {
        flex-direction: column;
        gap: 0.2rem;
      }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      html { font-size: 16px; }
    }

    @media (min-width: 1025px) {
      html { font-size: 17px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-brand">
      <a class="site-title" href="{{ site.url }}/">{{ site.title }}</a>
      <span class="site-subtitle">{{ site.tagline }}</span>
    </div>
    <nav class="nav-links">
      <a href="{{ site.url }}/" {% if page.url == "/" %}class="active"{% endif %}>首页</a>
      <a href="{{ site.url }}/tags" {% if page.url == "/tags/" %}class="active"{% endif %}>标签</a>
      <a href="{{ site.url }}/feed.xml">RSS</a>
    </nav>
  </div>
</header>

<main>
{{ content }}
</main>

<footer class="site-footer">
  <p>© {{ site.time | date: '%Y' }} Lumino · Powered by Jekyll & GitHub Pages</p>
</footer>

</body>
</html>
